name: PR Hygiene

on:
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, reopened, labeled, unlabeled, milestoned, demilestoned]

jobs:
  hygiene:
    name: PR hygiene checks
    runs-on: ubuntu-latest
    # Skip release-please automation branches.
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    steps:
      - name: Check PR title format
        id: title
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const pattern = /^(feat|fix|chore|docs|test|refactor|perf|ci)\([a-z][a-z0-9-]*\): .{3,}/;
            if (!pattern.test(title)) {
              core.setFailed(
                `PR title "${title}" doesn't match required format.\n` +
                `Expected: type(scope): description\n` +
                `Examples: feat(wizard): add runtime detection\n` +
                `          fix(upgrade): never overwrite protected files\n` +
                `Valid types: feat, fix, chore, docs, test, refactor, perf, ci\n` +
                `See CONTRIBUTING.md for details.`
              );
            }

      - name: Check required labels
        id: labels
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const hasType = labels.some(l => l.startsWith('type:'));
            if (!hasType) {
              core.setFailed(
                `PR is missing a required "type:" label.\n` +
                `Add one of: type:feat, type:fix, type:chore, type:docs, type:ux\n` +
                `See CONTRIBUTING.md for the full label taxonomy.`
              );
            }

      - name: Check milestone assignment
        id: milestone
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const milestone = context.payload.pull_request.milestone;
            if (!milestone) {
              core.setFailed(
                `PR has no milestone assigned.\n` +
                `Assign a milestone (e.g. v0.18.1, v0.19.0) before merging.\n` +
                `See CONTRIBUTING.md for release cadence.`
              );
            }

      - name: Fail if any check failed
        if: steps.title.outcome == 'failure' || steps.labels.outcome == 'failure' || steps.milestone.outcome == 'failure'
        run: |
          echo "One or more PR hygiene checks failed — see step output above."
          exit 1
