name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 9 * * *'  # daily at 09:00 UTC
  workflow_dispatch:

jobs:
  stale:
    name: Mark and close stale items
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: 'status:stale'
          stale-issue-message: |
            This issue in **livemark** has been inactive for 60 days. It will be closed in 14 days unless there is new activity.
            If this is still relevant, please comment or remove the `status:stale` label.
          close-issue-message: |
            Closing due to inactivity. If this is still relevant, please reopen with updated context.

          # PRs
          days-before-pr-stale: 30
          days-before-pr-close: -1  # Never auto-close PRs — only label them.
          stale-pr-label: 'status:stale'
          stale-pr-message: |
            This PR in **livemark** has been inactive for 30 days. Please update it or close it if it's no longer needed.

          # Exempt labels (never marked stale)
          exempt-issue-labels: 'priority:p0,status:blocked'
          exempt-pr-labels: 'priority:p0,status:blocked'

          # Only process open items
          operations-per-run: 100
