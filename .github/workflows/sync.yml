name: Sync .claude/ templates

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'clinit version to sync (leave empty for latest)'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Upgrade .claude/ to latest templates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(gh release view --json tagName -q .tagName)" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download clinit binary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Downloading clinit ${VERSION}..."
          gh release download "${VERSION}" \
            --repo clistack/clinit \
            --pattern "clinit_*_linux_amd64.tar.gz" \
            --dir /tmp/clinit-dl
          tar -xzf /tmp/clinit-dl/clinit_*_linux_amd64.tar.gz -C /tmp/clinit-dl
          sudo mv /tmp/clinit-dl/clinit /usr/local/bin/clinit
          clinit --version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run upgrade
        run: clinit upgrade --apply --force --yes

      - name: Open upgrade PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/sync-claude-${{ steps.version.outputs.version }}
          title: "chore(sync): upgrade .claude/ to ${{ steps.version.outputs.version }}"
          body: |
            Automated upgrade of `.claude/` templates to `${{ steps.version.outputs.version }}`.

            Generated by [sync.yml](.github/workflows/sync.yml) after the release was published.

            ## Changes
            <!-- create-pull-request will list changed files -->

            ## Review notes
            - `CLAUDE.md` and `settings.json` are protected and were NOT overwritten
            - All other `.claude/` files were upgraded to the latest embedded templates
            - Placeholder values were re-applied from `.claude/clinit.json`

            If no files changed, this PR will not be created.
          commit-message: "chore(sync): upgrade .claude/ to ${{ steps.version.outputs.version }}"
          labels: "type:chore,area:cli,priority:p2"
          delete-branch: true
